kotlin:
  name: Kotlin
  creator: JetBrains
  description: "A modern, cross-platform, statically typed general-purpose high-level programming language with type inference. Designed for full interoperability with Java and officially preferred for Android development."
  people:
    - Andrey Breslav
    - Maxim Shafirov
    - Roman Elizarov
  influenced_by:
    - java
    - c_sharp
    - scala
    - groovy
    - swift
    - python
  influenced:
    - swift
    - java
  features:
    val_var:
      description: "Distinction between mutable (var) and read-only (val) local variables and properties, promoting immutability by default."
      inspired_by: scala.features.val_var
    types_on_the_right:
      description: "Type annotations follow the variable name, separated by a colon, instead of prefixing the type (e.g., 'name: String' instead of 'String name')."
      inspired_by: scala
    fun_keyword:
      description: "Functions and methods are declared using the 'fun' keyword, a concise syntax common in functional and educational languages."
      invented: false
    data_class:
      description: "Classes whose primary purpose is to hold data. The compiler automatically derives equals(), hashCode(), toString(), copy(), and componentN() functions from the properties declared in the primary constructor."
      inspired_by: scala.features.case_class
    component_functions:
      description: "Compiler-generated component1(), component2(), etc., methods for data classes that enable destructuring declarations (val (name, age) = person)."
      inspired_by: scala.features.extractors
    extensions:
      description: "Ability to add new functions and properties to existing classes without modifying their source code or using inheritance."
      inspired_by: c_sharp.features.extension_methods
    colon_for_inheritance:
      description: "Using a colon (:) to denote both inheritance (instead of 'extends') and interface implementation (instead of 'implements'), requiring a call to the parent constructor."
      inspired_by: scala
    primary_constructor:
      description: "A concise constructor syntax included directly in the class header, allowing property declaration and initialization without a separate constructor body."
      inspired_by: scala
    angle_brackets_for_generics:
      description: "Using angle brackets (<T>) for generic type parameters. Kotlin's implementation includes declaration-site variance (in/out) and reified type parameters, which are closer to C# than to Java's erased generics."
      inspired_by: c_sharp
    coroutines:
      description: "A language-level concurrency primitive based on suspendable functions. Unlike C#'s async/await, coroutines in Kotlin are a compiler-backed, library-implemented feature using suspend modifiers and Continuation-passing style."
      predated_by: c_sharp.features.async_await
      invented: true
