  creator: Roberto Ierusalimschy, Luiz Henrique de Figueiredo, Waldemar Celes (PUC-Rio)
  description: "A lightweight, high-level, multi-paradigm programming language designed primarily for embedded use in applications. Developed in 1993 at the Pontifical Catholic University of Rio de Janeiro, it is known for its small size, efficiency, and easy integration with C."
  people:
    - Roberto Ierusalimschy
    - Luiz Henrique de Figueiredo
    - Waldemar Celes
  influenced_by:
    - scheme
    #- clu
    - modula
    - c
    - c_plus_plus
  influenced: []
    #- moonscript
    #- fennel
    #- nelua
    #- terra
# ------------------------------------------
oberon:
  name: Oberon
  creator: Niklaus Wirth, Jürg Gutknecht
  description: "A general-purpose programming language created in 1987 as part of the Oberon operating system. It is the last member of the ALGOL-like language family (Euler, Algol-W, Pascal, Modula-2) and is known for its simplicity, type-safety, and support for object-oriented programming through type extension."
  people:
    - Niklaus Wirth
    - Jürg Gutknecht
  influenced_by:
    - modula_2
    - pascal
    - algol
  influenced:
    #- component_pascal
    - go
    - zig
    #- v
# ------------------------------------------
object_pascal:
  name: Object Pascal
  creator: Larry Tesler, Niklaus Wirth (Apple Computer)
  description: "An extension of the Pascal programming language that adds object-oriented programming features. It was developed at Apple Computer in 1985 and later adopted and extended by Borland for its Delphi product, becoming the foundation for rapid application development on Windows."
  people:
    - Larry Tesler
    - Niklaus Wirth
  influenced_by:
    - pascal
    - smalltalk
    - simula
  influenced:
    - delphi
    - c_sharp
    - java
# ------------------------------------------
ocaml:
  name: OCaml
  creator: Xavier Leroy, Jérôme Vouillon, Damien Doligez, Didier Rémy (INRIA)
  description: "A multi-paradigm, general-purpose programming language that extends the Caml dialect of ML with object-oriented features. Created in 1996 at INRIA, it is known for its powerful type system, type inference, and high performance as both a compiled and interpreted language."
  people:
    - Xavier Leroy
    - Jérôme Vouillon
    - Damien Doligez
    - Didier Rémy
  influenced_by:
    #- caml
    - standard_ml
    - pascal
    - c
  influenced:
    - f_sharp
    #- reason
    #- rescript
    - rust
    - scala
# ------------------------------------------
zig:
  name: Zig
  creator: Andrew Kelley
  description: "A general-purpose, statically typed, compiled system programming language designed for robustness, optimality, and maintainability. It aims to be a better C/C++ by providing manual memory management without garbage collection, compile-time code execution, and seamless C interoperability."
  people:
    - Andrew Kelley
  influenced_by:
    - c
    - c_plus_plus
    - rust
    - go
    - javascript
  influenced: []
# ------------------------------------------
crystal:
  name: Crystal
  creator: Ary Borenszweig, Juan Wajnerman (Manas Technology Solutions)
  description: "A general-purpose, object-oriented programming language with syntax inspired by Ruby. It is statically typed and compiled, aiming for the performance of C while maintaining the productivity and elegance of Ruby."
  people:
    - Ary Borenszweig
    - Juan Wajnerman
  influenced_by:
    - ruby
    - c
    - c_plus_plus
    - c_sharp
    - python
  influenced: []
# ------------------------------------------
mesa:
  name: Mesa
  creator: Charles Geschke, Butler Lampson, James Mitchell, Edwin Satterthwaite (Xerox PARC)
  description: "A pioneering modular, strongly-typed, object-oriented programming language developed in the mid-1970s at Xerox PARC. It was used to build the Xerox Star and GlobalView office systems and had a major influence on the design of Modula-2 and Java."
  people:
    - Charles Geschke
    - Butler Lampson
    - James Mitchell
    - Edwin Satterthwaite
  influenced_by:
    - pascal
    - simula
    - smalltalk
  influenced:
    - modula_2
    - java
    - c_sharp
    - ada
# ------------------------------------------
modula_2:
  name: Modula-2
  creator: Niklaus Wirth
  description: "A structured, procedural programming language developed between 1977 and 1980 as a successor to Pascal. It introduces the module concept for separate compilation and data encapsulation, and was designed as the system language for the Lilith workstation."
  people:
    - Niklaus Wirth
  influenced_by:
    - pascal
    - modula
    - mesa
  influenced:
    - modula_3
    - oberon
    - ada
    #- component_pascal
# ------------------------------------------
algol_58:
  name: ALGOL 58
  creator: International Committee (ACM/GAMM)
  description: "The first version of the ALGOL programming language, originally known as IAL (International Algebraic Language). It laid the foundation for ALGOL 60 and the concept of a machine-independent algorithmic language."
# ------------------------------------------
algol_w:
  name: ALGOL W
  creator: Niklaus Wirth, Tony Hoare
  description: "A programming language based on a proposal for a successor to ALGOL 60. It is a transitional language that introduced many concepts later refined in Pascal."
# ------------------------------------------
bash:
  name: Bash
  creator: Brian Fox (GNU Project)
  description: "The GNU Project's shell and command language, written as a free software replacement for the Bourne shell. It is the default shell on most Linux distributions."
# ------------------------------------------
freebasic:
  name: FreeBASIC
  creator: Andre Victor T. Vicentini
  description: "A free and open-source multiplatform BASIC compiler. It is syntax-compatible with Microsoft QuickBASIC and aims to provide a modern, 32/64-bit development environment."
# ------------------------------------------
matlab:
  name: MATLAB
  creator: Cleve Moler (MathWorks)
  description: "A proprietary multi-paradigm programming language and numeric computing environment. It is widely used in academia and industry for matrix manipulations, algorithm implementation, and data visualization."
# ------------------------------------------
prolog:
  name: Prolog
  creator: Alain Colmerauer, Philippe Roussel
  description: "A logic programming language from the early 1970s, widely used in artificial intelligence and computational linguistics. It is based on formal logic and Horn clauses."
# ------------------------------------------
purebasic:
  name: PureBasic
  creator: Frédéric Laboureur (Fantaisie Software)
  description: "A commercially distributed procedural programming language and IDE based on BASIC. It is known for generating fast, native executables for Windows, Linux, and macOS."
# ------------------------------------------
qbasic:
  name: QBasic
  creator: Microsoft
  description: "An integrated development environment and interpreter for a dialect of BASIC, based on QuickBASIC. It was included with MS-DOS and early versions of Windows as a tool for beginners."
# ------------------------------------------
small_basic:
  name: Small Basic
  creator: Vijaye Raji (Microsoft)
  description: "A simplified version of BASIC from Microsoft, aimed at teaching programming to beginners and children. It features a small set of keywords and an easy-to-use IDE."
# ------------------------------------------
speedcoding:
  name: Speedcoding
  creator: John W. Backus (IBM)
  description: "The first high-level programming language for an IBM computer, created in 1953 for the IBM 701. It was designed to simplify scientific calculations involving floating-point numbers."
# ------------------------------------------
turbo_pascal:
  name: Turbo Pascal
  creator: Anders Hejlsberg (Borland)
  description: "A highly popular integrated development environment and compiler for Pascal. It was renowned for its extremely fast compilation speed and low cost, making it a dominant tool in the 1980s."
# ------------------------------------------
actionscript:
  name: ActionScript
  creator: Gary Grossman (Macromedia)
  description: "An object-oriented programming language originally developed by Macromedia for Flash Player. It is a dialect of ECMAScript and was used extensively for rich web applications and games before Flash's decline."
# ------------------------------------------
livescript:
  name: LiveScript
  creator: Jeremy Ashkenas
  description: "A functional programming language that compiles to JavaScript, created as an indirect successor to Coco and a fork of CoffeeScript. It emphasizes readability and expressiveness."
# ------------------------------------------
standard_ml:
  name: Standard ML
  creator: Robin Milner, Mads Tofte, Robert Harper (University of Edinburgh)
  description: "A general-purpose, functional programming language known for its powerful module system and formal specification. It is widely used in compiler research and theorem proving."
# ------------------------------------------
elixir:
  name: Elixir
  creator: José Valim
  description: "A dynamic, functional language designed for building scalable and maintainable applications. It runs on the Erlang VM (BEAM) and is known for its excellent tooling and metaprogramming capabilities."
# ------------------------------------------
common_lisp:
  name: Common Lisp
  creator: ANSI X3J13 Committee
  description: "A standardized, multi-paradigm dialect of Lisp designed for industrial-strength applications. It includes a powerful object system (CLOS) and extensive libraries."
# ------------------------------------------
visual_basic:
  name: Visual Basic
  creator: Alan Cooper (Microsoft)
  description: "An event-driven programming language and integrated development environment from Microsoft. It popularized rapid application development for Windows through its drag-and-drop GUI builder."
# ------------------------------------------
algol_60:
  name: ALGOL 60
  creator: International Committee (Peter Naur et al.)
  description: "A landmark programming language that introduced code blocks with `begin`/`end`, lexical scoping, and the Backus-Naur form for describing syntax. It heavily influenced most subsequent languages."
# ------------------------------------------
pl_sql:
  name: PL/SQL
  creator: Oracle Corporation
  description: "A procedural extension language for SQL and the Oracle relational database. It tightly integrates database operations with procedural constructs like loops and conditions."
